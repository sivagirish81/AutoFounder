name: Publish generated site

on:
  repository_dispatch:
    types: [publish-generated-site]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write generated page
        env:
          CONTENT_B64: ${{ github.event.client_payload.content_base64 }}
          TARGET_PATH: ${{ github.event.client_payload.path }}
        run: |
          mkdir -p "$(dirname "$TARGET_PATH")"
          echo "$CONTENT_B64" | base64 --decode > "$TARGET_PATH"

      - name: Commit and push
        env:
          IDEA: ${{ github.event.client_payload.idea }}
          ITERATION: ${{ github.event.client_payload.iteration }}
        run: |
          git config user.name "autofounder-bot"
          git config user.email "autofounder-bot@users.noreply.github.com"
          git add generated-app/app/page.tsx
          git commit -m "Update generated site (iteration ${ITERATION})" || exit 0
          git push
